<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu — PizzaCraft 🍕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="loader">
    <div class="loader-pizza">🍕</div>
    <p class="loader-text">Loading deliciousness...</p>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <span class="logo-icon">🍕</span>
      <span class="logo-text">Pizza<span class="logo-accent">Craft</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html" class="active">Menu</a></li>
      <li><a href="cart.html">Cart</a></li>
    </ul>
    <a href="cart.html" class="cart-btn">
      🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </a>
    <button class="hamburger" id="hamburger">☰</button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="cart.html">Cart 🛒</a>
  </div>

  <!-- Menu Hero -->
  <section class="page-hero">
    <div class="page-hero-content">
      <span class="section-tag">Our Craft</span>
      <h1 class="page-hero-title">The Menu</h1>
      <p>Every pizza tells a story. Find yours.</p>
    </div>
  </section>

  <!-- Filter Tabs -->
  <section class="menu-section">
    <div class="container">
      <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all">All Pizzas</button>
        <button class="filter-btn" data-filter="Veg">🟢 Veg</button>
        <button class="filter-btn" data-filter="Non-Veg">🔴 Non-Veg</button>
      </div>

      <!-- Menu Grid -->
      <div class="menu-grid" id="menuGrid">
        <div class="loading-menu">🍕 Loading menu...</div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2025 PizzaCraft. All Rights Reserved. Made with ❤️ & 🔥</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    let allPizzas = [];

    // Load menu from backend
    fetch("/menu")
      .then((r) => r.json())
      .then(({ data }) => {
        allPizzas = data;
        renderMenu(data);
      })
      .catch(() => {
        document.getElementById("menuGrid").innerHTML =
          '<p style="color:#aaa; text-align:center; grid-column:1/-1; padding:2rem;">⚠️ Could not load menu. Make sure the server is running.<br><code style="color:#E63946">node server.js</code></p>';
      });

    // Render pizza cards
    function renderMenu(pizzas) {
      const grid = document.getElementById("menuGrid");
      if (pizzas.length === 0) {
        grid.innerHTML = '<p class="no-results">No pizzas found in this category.</p>';
        return;
      }
      grid.innerHTML = pizzas
        .map(
          (p) => `
        <div class="pizza-card" data-category="${p.category}">
          <div class="pizza-card-top" style="background: radial-gradient(circle at 60% 40%, ${p.color}33, #1a0a0a)">
            <span class="pizza-tag">${p.tag}</span>
            <div class="pizza-emoji">${p.emoji}</div>
          </div>
          <div class="pizza-card-body">
            <div class="pizza-meta">
              <span class="pizza-category ${p.category === "Veg" ? "veg" : "nonveg"}">${p.category === "Veg" ? "🟢" : "🔴"} ${p.category}</span>
            </div>
            <h3 class="pizza-name">${p.name}</h3>
            <p class="pizza-desc">${p.description}</p>
            <div class="pizza-footer">
              <span class="pizza-price">₹${p.price}</span>
              <button class="btn-add" onclick="addToCart(${p.id}, '${p.name}', ${p.price})">
                Add to Cart +
              </button>
            </div>
          </div>
        </div>`
        )
        .join("");
    }

    // Filter buttons
    document.querySelectorAll(".filter-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const filter = btn.dataset.filter;
        renderMenu(filter === "all" ? allPizzas : allPizzas.filter((p) => p.category === filter));
      });
    });
  </script>
</body>
</html>
